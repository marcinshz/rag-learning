services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: cvrag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cvrag
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    env_file:
      - .env
    depends_on:
      - postgres

volumes:
  pgdata: